apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-analyzer-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-analyzer-role
rules:
- apiGroups: [""]
  resources: ["pods", "events", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-analyzer-binding
subjects:
- kind: ServiceAccount
  name: ai-analyzer-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: ai-analyzer-role
  apiGroup: rbac.authorization.k8s.io
